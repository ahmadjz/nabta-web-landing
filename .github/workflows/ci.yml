name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (astro)
        run: npm run build

      - name: Smoke test (emitted dist)
        run: npm run test

      # Preview-SERVED checks — astro preview honours `base` (astro dev does not).
      # SITE-02/03 extend this step with an internal link-check + Lighthouse.
      - name: Preview-served checks
        run: npm run test:preview
